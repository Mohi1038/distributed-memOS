version: '3.8'

services:
  # Common infrastructure
  nats:
    image: nats:2.9
    ports:
      - "4222:4222"
      - "8222:8222"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: memos
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"

  # MemOS Nodes
  memos-node-1:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      - NODE_ID=node-1
      - NODE_HOST=memos-node-1
      - NATS_URL=nats://nats:4222
      - POSTGRES_URL=postgres://user:password@postgres:5432/memos?sslmode=disable
      - QDRANT_URL=http://qdrant:6333
      - GRPC_PORT=50051
    depends_on:
      - nats
      - postgres
      - qdrant
    ports:
      - "50051:50051"

  memos-node-2:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      - NODE_ID=node-2
      - NODE_HOST=memos-node-2
      - NATS_URL=nats://nats:4222
      - POSTGRES_URL=postgres://user:password@postgres:5432/memos?sslmode=disable
      - QDRANT_URL=http://qdrant:6333
      - GRPC_PORT=50051
    depends_on:
      - nats
      - postgres
      - qdrant
    ports:
      - "50052:50051"

  memos-node-3:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      - NODE_ID=node-3
      - NODE_HOST=memos-node-3
      - NATS_URL=nats://nats:4222
      - POSTGRES_URL=postgres://user:password@postgres:5432/memos?sslmode=disable
      - QDRANT_URL=http://qdrant:6333
      - GRPC_PORT=50051
    depends_on:
      - nats
      - postgres
      - qdrant
    ports:
      - "50053:50051"
