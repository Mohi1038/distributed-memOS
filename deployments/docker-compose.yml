services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: memos
      POSTGRES_PASSWORD: memos_password
      POSTGRES_DB: memos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../scripts/init.sql:/docker-entrypoint-initdb.d/init.sql

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nats:
    image: nats:latest
    ports:
      - "4222:4222"
      - "8222:8222"

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: "neo4j/neo4j_password"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "9091:9090"

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"

  memos-server:
    build:
      context: ..
      dockerfile: Dockerfile
    image: memos-server:latest
    environment:
      - POSTGRES_URL=postgres://app_user:app_secure_password@postgres:5432/memos_db?sslmode=disable
      - QDRANT_URL=qdrant:6334
      - REDIS_URL=redis:6379
      - NATS_URL=nats://nats:4222
      - NEO4J_URL=neo4j://neo4j:7687
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - USE_REAL_EMBEDDING=${USE_REAL_EMBEDDING:-false}
    ports:
      - "50051:50051"
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      nats:
        condition: service_started
      neo4j:
        condition: service_started

volumes:
  postgres_data:
  qdrant_data:
  neo4j_data:
  grafana_data:
