linters-settings:
  govet:
    check-shadowing: true
  gocyclo:
    min-complexity: 15
  maligned:
    suggest-new: true
  dupl:
    threshold: 100
  goconst:
    min-len: 2
    min-occurrences: 2
  misspell:
    locale: US
  lll:
    line-length: 120
  goimports:
    local-prefixes: github.com/mohi1038/memos

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - structcheck
    - varcheck
    - ineffassign
    - deadcode
    - typecheck
    - bodyclose
    - stylecheck
    - gocyclo
    - gocognit
    - goconst
    - unconvert
    - unparam
    - nakedret
    - prealloc
    - exportloopref

run:
  timeout: 5m
  tests: true
  skip-dirs:
    - vendor
    - sdk/python
